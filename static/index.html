<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,interactive-widget=resizes-content">
    <meta name="color-scheme" content="dark">
    <title>Web Terminal for Kiro</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
    <link rel="apple-touch-icon" href="/apple-touch-icon.png">
    <link rel="manifest" href="/manifest.json">
    <link rel="stylesheet" href="/style.css">
    <!-- [html-validate-disable-next no-style-tag -- critical CSS for instant loading indicator] -->
    <style>
      #loading {
        position: fixed;
        inset: 0;
        z-index: 200;
        display: flex;
        align-items: center;
        justify-content: center;
        /* web-terminal-kiro accent (matches the createTerminal theme --accent); the pre-JS
           overlay can't read the JS theme, so the brand purple is set here too. */
        --accent: hsl(263.1683 100% 80%);
        background: #000;
        color: var(--accent);
        /* easing matches the UI bundle's --ease-exit; tokens are scoped to .wt-root
           and unreachable here, so the value is inlined like the --accent literal. */
        transition: opacity 0.3s cubic-bezier(0.4, 0, 1, 1);
      }
      #loading.fade {
        opacity: 0;
      }
      #loading[role="alert"] {
        flex-direction: column;
        gap: 1rem;
        padding: 1rem;
        font-family: system-ui, -apple-system, sans-serif;
        text-align: center;
      }
      #loading[role="alert"] button {
        min-inline-size: 2.75rem;
        min-block-size: 2.75rem;
        padding-inline: 1rem;
        border: 1px solid currentcolor;
        border-radius: 0.5rem;
        background: color-mix(in oklch, currentcolor 16%, transparent);
        color: inherit;
        font: inherit;
        font-weight: 600;
        cursor: pointer;
        touch-action: manipulation;
      }
      #loading[role="alert"] button:focus-visible {
        outline: 2px solid currentcolor;
        outline-offset: 3px;
      }
      #loading .bar {
        position: relative;
        inline-size: min(220px, 62vw);
        block-size: 5px;
        overflow: hidden;
        border-radius: 999px;
        background: color-mix(in oklch, currentColor 16%, transparent);
      }
      #loading .bar::before {
        content: "";
        position: absolute;
        inset-block: 0;
        inline-size: 42%;
        border-radius: inherit;
        background: linear-gradient(
          90deg,
          transparent,
          currentColor 28%,
          color-mix(in oklch, currentColor, #fff 45%) 50%,
          currentColor 72%,
          transparent
        );
        filter: drop-shadow(
          0 0 4px color-mix(in oklch, currentColor 55%, transparent)
        );
        animation: wt-loading-slide 1.5s cubic-bezier(0.65, 0, 0.35, 1) infinite;
      }
      @keyframes wt-loading-slide {
        0% {
          transform: translateX(-110%);
        }
        100% {
          transform: translateX(250%);
        }
      }
      @media (prefers-reduced-motion: reduce) {
        #loading .bar::before {
          animation-duration: 3s;
        }
      }
      .noscript-fallback {
        position: fixed;
        inset: 0;
        z-index: 300;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0;
        padding: 1rem;
        background: #000;
        /* brand accent (matches #loading --accent and the createTerminal theme) */
        color: hsl(263.1683 100% 80%);
        font-family:
          system-ui,
          -apple-system,
          sans-serif;
        text-align: center;
      }
    </style>
  </head>
  <body>
    <!-- createTerminal() (in /app.js) builds the entire terminal UI inside this
     root element; the loading overlay is a sibling so it is never cleared. -->
    <div id="terminal"></div>
    <div id="loading" role="status" aria-label="Loading">
      <div class="bar" aria-hidden="true"></div>
    </div>
    <noscript>
      <p class="noscript-fallback">
        Web Terminal for Kiro needs JavaScript to run the terminal. Enable
        JavaScript and reload.
      </p>
    </noscript>
    <script type="importmap">
      {
        "imports": {
          "@cplieger/web-terminal-engine": "/vendor/cplieger-web-terminal-engine/index.js",
          "@cplieger/web-terminal-ui": "/vendor/cplieger-web-terminal-ui/index.js",
          "@cplieger/web-terminal-ui/presets": "/vendor/cplieger-web-terminal-ui/presets.js"
        }
      }
    </script>
    <script
      type="module"
      src="/app.js"
    ></script>
  </body>
</html>
