<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover,interactive-widget=resizes-content"
    />
    <meta
      name="color-scheme"
      content="dark"
    />
    <title>VibeCLI</title>
    <link
      rel="icon"
      type="image/svg+xml"
      href="/favicon.svg"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="/favicon-32x32.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="16x16"
      href="/favicon-16x16.png"
    />
    <link
      rel="apple-touch-icon"
      href="/apple-touch-icon.png"
    />
    <link
      rel="manifest"
      href="/manifest.json"
    />
    <link
      rel="stylesheet"
      href="/style.css"
    />
    <!-- [html-validate-disable-next no-style-tag -- critical CSS for instant loading indicator] -->
    <style>
      #loading {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-direction: column;
        gap: 12px;
        z-index: 200;
        background: #000;
        font-family:
          system-ui,
          -apple-system,
          sans-serif;
        color: #b48eff;
        font-size: 18px;
        transition: opacity 0.3s ease;
      }
      #loading.fade {
        opacity: 0;
      }
      #loading .spin {
        width: 32px;
        height: 32px;
        border: 3px solid #b48eff;
        border-right-color: transparent;
        border-radius: 50%;
        animation: sp 0.6s linear infinite;
      }
      @keyframes sp {
        to {
          transform: rotate(360deg);
        }
      }
      .noscript-fallback {
        position: fixed;
        inset: 0;
        z-index: 300;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0;
        padding: 1rem;
        background: #000;
        color: #b48eff;
        font-family:
          system-ui,
          -apple-system,
          sans-serif;
        text-align: center;
      }
    </style>
  </head>
  <body>
    <!-- mount() (in /app.js) builds the entire terminal UI inside this root
     element; the loading overlay is a sibling so mount never clears it. -->
    <div id="terminal"></div>
    <div id="loading" role="status" aria-live="polite">
      <div class="spin" aria-hidden="true"></div>
      Loading…
    </div>
    <noscript>
      <p class="noscript-fallback">
        VibeCLI needs JavaScript to run the terminal. Enable JavaScript and
        reload.
      </p>
    </noscript>
    <script type="importmap">
      {
        "imports": {
          "@cplieger/web-terminal-engine": "/vendor/cplieger-web-terminal-engine/index.js",
          "@cplieger/web-terminal-ui": "/vendor/cplieger-web-terminal-ui/index.js"
        }
      }
    </script>
    <script
      type="module"
      src="/app.js"
    ></script>
  </body>
</html>
