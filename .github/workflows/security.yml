name: Security

on:
  pull_request:
    paths:
      - "go.mod"
      - "go.sum"
      - "package.json"
      - "package-lock.json"
      - "Dockerfile"
      - ".github/workflows/security.yml"
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

jobs:
  scan:
    uses: cplieger/ci/.github/workflows/security-scan.yaml@38aa4e20293b20ff3f707553f46f54e287c97b5f # v1
