name: Security

on:
  pull_request:
    paths:
      - "go.mod"
      - "go.sum"
      - "package.json"
      - "package-lock.json"
      - "Dockerfile"
      - ".github/workflows/security.yml"
  schedule:
    - cron: "17 5 * * 1"
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

jobs:
  scan:
    uses: cplieger/ci/.github/workflows/security-scan.yaml@8f09bcd5f8ac39bc5059f4c45d3fcb10a1a3b23a # v1
