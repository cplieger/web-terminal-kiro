name: CI

on:
  pull_request:
    branches: [main]
    paths-ignore:
      - "**/*.md"
      - "LICENSE"
      - ".gitignore"
  push:
    branches: [main]
    paths-ignore:
      - "**/*.md"
      - "LICENSE"
      - ".gitignore"
  workflow_dispatch:

jobs:
  go:
    uses: cplieger/ci/.github/workflows/go-ci.yaml@a4a5c8d560e69958c08f1294f699a9c41d187a23 # v1
    with:
      app: true
      dockerfile-lint: true
      working-directory: "."
      go-version-file: "go.mod"

  web:
    uses: cplieger/ci/.github/workflows/ts-ci.yaml@a4a5c8d560e69958c08f1294f699a9c41d187a23 # v1
    with:
      working-directory: "static-src"
      web-lint: true
