name: CI

on:
  pull_request:
    branches: [main]
    paths-ignore:
      - "**/*.md"
      - "LICENSE"
      - ".gitignore"
  push:
    branches: [main]
    paths-ignore:
      - "**/*.md"
      - "LICENSE"
      - ".gitignore"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  go:
    uses: cplieger/ci/.github/workflows/go-ci.yaml@2c6289a7dee062be6411c1cd0d3ab4f784d75f1e # v1
    with:
      working-directory: "."
      go-version-file: "go.mod"
  web:
    uses: cplieger/ci/.github/workflows/ts-ci.yaml@2c6289a7dee062be6411c1cd0d3ab4f784d75f1e # v1
    with:
      working-directory: "static-src"
      web-lint: true