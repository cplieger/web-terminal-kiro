name: CI

on:
  pull_request:
    branches: [main]
    paths-ignore:
      - "**/*.md"
      - "LICENSE"
      - ".gitignore"
  push:
    branches: [main]
    paths-ignore:
      - "**/*.md"
      - "LICENSE"
      - ".gitignore"
  workflow_dispatch:

jobs:
  go:
    uses: cplieger/ci/.github/workflows/go-ci.yaml@19357decce18d479bf83e80a8d78b67226dfaf24 # v1
    with:
      app: true
      dockerfile-lint: true
      working-directory: "."
      go-version-file: "go.mod"

  web:
    uses: cplieger/ci/.github/workflows/ts-ci.yaml@19357decce18d479bf83e80a8d78b67226dfaf24 # v1
    with:
      working-directory: "static-src"
      web-lint: true
