name: CI

on:
  pull_request:
    branches: [main]
    paths-ignore:
      - "**/*.md"
      - "LICENSE"
      - ".gitignore"
  push:
    branches: [main]
    paths-ignore:
      - "**/*.md"
      - "LICENSE"
      - ".gitignore"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  go:
    uses: cplieger/ci/.github/workflows/go-ci.yaml@38aa4e20293b20ff3f707553f46f54e287c97b5f # v1
    with:
      app: true
      dockerfile-lint: true
      working-directory: "."
      go-version-file: "go.mod"

  web:
    uses: cplieger/ci/.github/workflows/ts-ci.yaml@38aa4e20293b20ff3f707553f46f54e287c97b5f # v1
    with:
      working-directory: "static-src"
      web-lint: true