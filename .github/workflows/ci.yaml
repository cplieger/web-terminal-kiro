name: CI

on:
  pull_request:
    branches: [main]
    paths-ignore:
      - "**/*.md"
      - "LICENSE"
      - ".gitignore"
  push:
    branches: [main]
    paths-ignore:
      - "**/*.md"
      - "LICENSE"
      - ".gitignore"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  go:
    uses: cplieger/ci/.github/workflows/go-ci.yaml@7b8370ba0d53e8c2a60b0380a9b0d7fb8ec693df # v1
    with:
      working-directory: "."
      go-version-file: "go.mod"
  web:
    uses: cplieger/ci/.github/workflows/ts-ci.yaml@7b8370ba0d53e8c2a60b0380a9b0d7fb8ec693df # v1
    with:
      working-directory: "static-src"
      web-lint: true