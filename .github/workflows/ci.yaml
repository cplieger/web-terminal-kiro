name: CI

on:
  pull_request:
    branches: [main]
    paths-ignore:
      - "**/*.md"
      - "LICENSE"
      - ".gitignore"
  push:
    branches: [main]
    paths-ignore:
      - "**/*.md"
      - "LICENSE"
      - ".gitignore"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  go:
    uses: cplieger/ci/.github/workflows/go-ci.yaml@d77b0f3fb79ce80400b70f5c14f28ba470ce7f94 # v1
    with:
      working-directory: "."
      go-version-file: "go.mod"
  web:
    uses: cplieger/ci/.github/workflows/ts-ci.yaml@d77b0f3fb79ce80400b70f5c14f28ba470ce7f94 # v1
    with:
      working-directory: "static-src"
      web-lint: true