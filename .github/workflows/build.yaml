name: Build and Push

on:
  push:
    branches: [main]
    paths:
      - "Dockerfile"
      - "go.mod"
      - "*.go"
      - "internal/**"
      - "static-src/**"
      - "entrypoint.sh"
      - "setup-tools.sh"
      - "tools.json"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  packages: write
  id-token: write
  attestations: write
  security-events: write

env:
  IMAGE_NAME: ${{ github.repository_owner }}/vibecli
  REGISTRY: ghcr.io

jobs:
  build:
    # Skip Docker build + push when the head commit was a renovate-managed
    # tsgo bump (marked with [skip-build] via the commitMessageSuffix in
    # .github/renovate.json). Latest tsgo cuts every few days; rebuilding the
    # whole image for each is waste. CI (.github/workflows/ci.yaml) still runs
    # on the bump PR to validate the new version compiles.
    #
    # CLEANUP WHEN TS 7 IS STABLE: drop this if-guard. The matching
    # commitMessageSuffix in renovate.json should be removed at the same
    # time. See the description on the @typescript/native-preview rule
    # in .github/renovate.json for the full rationale.
    # Skip the Docker build only when BOTH conditions hold:
    #   1. The head commit was authored by renovate[bot]
    #   2. The commit message contains the [skip-build] marker
    # The dual gate stops a non-renovate commit body that happens to
    # mention [skip-build] in prose (e.g. this comment in a squash-merge
    # body) from accidentally skipping the build.
    if: ${{ !(github.event.head_commit.author.name == 'renovate[bot]' && contains(github.event.head_commit.message, '[skip-build]')) }}
    runs-on: ubuntu-24.04
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          # git-cliff computes the next SemVer from conventional-commit
          # history, so it needs full history + all tags.
          fetch-depth: 0

      - name: Set up Docker Buildx

        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Log in to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Compute SemVer tag
        id: prep
        run: |
          # Install git-cliff (also used later for release notes).
          # renovate: datasource=github-releases depName=orhun/git-cliff
          CLIFF_VERSION=v2.13.1
          curl -fsSL "https://github.com/orhun/git-cliff/releases/download/${CLIFF_VERSION}/git-cliff-${CLIFF_VERSION#v}-x86_64-unknown-linux-gnu.tar.gz" \
            | tar xz -C /usr/local/bin --strip-components=1 "git-cliff-${CLIFF_VERSION#v}/git-cliff"

          # Next SemVer from conventional-commit history. Bump policy
          # + initial (no-tags-yet) version live in cliff.toml [bump].
          NEXT="$(git cliff --bumped-version)"
          NEXT="${NEXT#v}"
          MAJOR="${NEXT%%.*}"
          MINOR="${NEXT%.*}"
          {
            echo "version=v${NEXT}"
            echo "major=v${MAJOR}"
            echo "minor=v${MINOR}"
          } >> "$GITHUB_OUTPUT"
          echo "Computed version: v${NEXT} (major=v${MAJOR} minor=v${MINOR})"

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0
        with:
          images: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          # Priority controls push order (metadata-action sorts desc;
          # build-push-action pushes in that order). Lowest priority is
          # pushed last and is what Docker Hub shows on the repo home
          # page, so vX.Y.Z (the full version) goes last.
          tags: |
            type=sha,format=long,priority=500
            type=raw,value=latest,priority=400
            type=raw,value=${{ steps.prep.outputs.major }},priority=300
            type=raw,value=${{ steps.prep.outputs.minor }},priority=200
            type=raw,value=${{ steps.prep.outputs.version }},priority=100

      - name: Build and push
        id: push
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          provenance: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trivy scan published image
        continue-on-error: true
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.push.outputs.digest }}
          format: "sarif"
          output: "trivy-image.sarif"
          severity: "HIGH,CRITICAL"
          ignore-unfixed: true

      - name: Upload Trivy SARIF
        if: always()
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@7211b7c8077ea37d8641b6271f6a365a22a5fbfa # v4.36.0
        with:
          sarif_file: "trivy-image.sarif"
          category: "trivy-image-build"

      - name: Generate SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.push.outputs.digest }}
          format: spdx-json
          output-file: sbom.spdx.json
          upload-release-assets: false

      - name: Install Cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Sign image
        env:
          IMAGE_REF: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.push.outputs.digest }}
        run: cosign sign --yes "$IMAGE_REF"

      - name: Attest SBOM
        env:
          IMAGE_REF: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.push.outputs.digest }}
        run: |
          cosign attest --yes \
            --predicate sbom.spdx.json \
            --type spdxjson \
            "$IMAGE_REF"

      - name: Generate release notes
        run: |
          # git-cliff already installed in the Compute SemVer tag step.
          git-cliff --latest --strip header > RELEASE_NOTES.md

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.prep.outputs.version }}
          DIGEST: ${{ steps.push.outputs.digest }}
        run: |
          TAG="${VERSION}"
          gh release create "$TAG" \
            --title "$TAG" \
            --notes-file RELEASE_NOTES.md \
            sbom.spdx.json

      - name: Notify homelab
        if: github.ref == 'refs/heads/main'
        run: |
          curl -fsSL -X POST \
            -H "Authorization: token ${{ secrets.HOMELAB_DISPATCH_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/cplieger/homelab/dispatches" \
            -d "{\"event_type\":\"image-update\",\"client_payload\":{\"image\":\"${{ env.IMAGE_NAME }}\",\"tag\":\"${{ steps.prep.outputs.version }}\",\"digest\":\"${{ steps.push.outputs.digest }}\"}}"
