# Per-app config for the shared image-smoke harness (tests/image-smoke.sh,
# synced from cplieger/ci). Waits for the container HEALTHCHECK (HTTP GET
# /api/health on :9848) to report "healthy" - proving the server binds, the
# embedded UI is present, and the health endpoint serves. First boot is
# blocking: entrypoint.sh downloads and verifies kiro-cli in the foreground
# before the server binds (tool installs converge in the background after the
# listener is up), so /api/health stays down until the kiro-cli install
# finishes. TIMEOUT must cover the image's HEALTHCHECK start-period (20m,
# derived from the entrypoint's cumulative foreground deadlines — see the
# Dockerfile HEALTHCHECK comment) plus probe scheduling headroom, or a
# slow-but-OK cold boot is failed prematurely. Keep in lockstep with the
# Dockerfile start-period and scripts/dev-deploy.sh DEPLOY_TIMEOUT.
SMOKE_APP_NAME=web-terminal-kiro
SMOKE_TIMEOUT=1260
