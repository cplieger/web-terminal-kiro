# Example compose for vibecli. See the README for all configuration options and hardening.
services:
  vibecli:
    image: ghcr.io/cplieger/vibecli:latest
    container_name: vibecli
    restart: unless-stopped

    environment:
      TZ: "Europe/Paris"

    ports:
      - "9848:9848"

    volumes:
      - "/opt/appdata/vibecli/config:/config"
      - "/opt/appdata/vibecli/workspace:/workspace"
